services:
  mysql:
    image: mysql:8.4
    container_name: mysqlprojektarbeit
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb/:/docker-entrypoint-initdb.d/:ro
 
volumes:
  mysql_data: